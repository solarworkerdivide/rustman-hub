<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Icon square -->
  <rect width="44" height="44" rx="10" x="2" y="2" fill="url(#bgGrad)"/>
  <rect width="44" height="44" rx="10" x="2" y="2" stroke="url(#og)" stroke-width="1" stroke-opacity="0.3" fill="none"/>

  <!-- R letterform (scaled to 44px box) -->
  <rect x="10" y="9"  width="5"  height="26" rx="1"  fill="url(#og)"/>
  <rect x="10" y="9"  width="16" height="5"  rx="1"  fill="url(#og)"/>
  <rect x="10" y="22" width="16" height="5"  rx="1"  fill="url(#og)"/>
  <rect x="24" y="9"  width="5"  height="6"  rx="1"  fill="url(#og)"/>
  <rect x="24" y="21" width="5"  height="6"  rx="1"  fill="url(#og)"/>
  <rect x="22" y="14" width="4"  height="9"  rx="0"  fill="url(#og)"/>
  <polygon points="19,27 24,27 34,35 29,35" fill="url(#og)"/>
  <!-- Dot accent -->
  <circle cx="36" cy="36" r="2.2" fill="#fb923c" opacity="0.8"/>

  <!-- Wordmark text -->
  <!-- R -->
  <text x="56" y="34" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
        font-size="22" font-weight="700" letter-spacing="-0.5" fill="#f4f4f5">
    RUST
  </text>
  <text x="103" y="34" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
        font-size="22" font-weight="700" letter-spacing="-0.5" fill="#fb923c">
    MAN
  </text>

  <!-- Tagline -->
  <text x="57" y="44" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
        font-size="7.5" font-weight="400" letter-spacing="1.8" fill="#52525b">
    API TESTING TOOL
  </text>
</svg>
